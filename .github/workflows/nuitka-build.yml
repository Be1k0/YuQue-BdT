name: 自动跨平台构建版本并发布版本
run-name: 构建版本 ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf8

jobs:
  build:
    name: 在 ${{ matrix.os }} 上构建版本
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装系统依赖（仅Linux）
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache libxcb-cursor0

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 构建可执行文件
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev"
          fi
          
          python build.py --version $VERSION 

      - name: 上传构建文件
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: 检出代码（用于读取更新日志）
        uses: actions/checkout@v4

      - name: 下载所有构建文件
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 获取当前日期
        id: date
        run: echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: 提取当前版本更新日志
        id: extract_changelog
        run: |
          VERSION=${{ github.ref_name }}
          # 尝试提取日志，如果没找到就给个默认提示
          awk -v ver="$VERSION" '/^## / {if ($2 == ver) {flag=1; next}} /^---/ {flag=0} flag' CHANGELOG.md > RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=（暂无更新日志，请在 CHANGELOG.md 中添加 $VERSION 版本记录）" >> $GITHUB_OUTPUT
          fi

      - name: 创建发行版（带自定义更新日志）
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.bin
          body: |
            ## ${{ github.ref_name }}
            
            >- ${{ steps.date.outputs.date }}
            
            ${{ steps.extract_changelog.outputs.notes }}